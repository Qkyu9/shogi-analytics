<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A. クリーム＆ゴールド — UIプレビュー</title>
    <link rel="stylesheet" href="/theme-previews/styles.css" />
    <style>
      :root {
        --color-bg: #faf7f2;
        --color-bg-sub: #f3ede4;
        --color-surface: #ffffff;
        --color-text: #3a3530;
        --color-text-sub: #7d766c;
        --color-primary: #b8860b;
        --color-tag-bg: #f5efe4;
        --color-tag-text: #9a7222;
        --color-border: #e5ddd0;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <h1>パターン A</h1>
      <p>クリーム＆ゴールド — 落ち着き・上品さ</p>
    </div>

    <nav class="nav-links">
      <a href="/theme-previews/index.html">一覧</a>
      <a href="/theme-previews/a.html" class="active">A</a>
      <a href="/theme-previews/b.html">B</a>
      <a href="/theme-previews/c.html">C</a>
    </nav>

    <div class="phone">
      <div class="phone-meta">
        <h2>A. クリーム＆ゴールド</h2>
        <p>明るいクリーム色 × 落ち着いたゴールド</p>
      </div>

      <div class="screen">
        <div class="app-bar">
          <span>将棋 Analytics</span>
          <span>設定</span>
        </div>

        <button class="btn-primary" type="button">対局を記録する</button>

        <div class="card">
          <div class="card-label">いまの弱点</div>
          <div class="card-title">寄せの崩し</div>
          <div class="card-sub">3回（42%）</div>
          <span class="card-link">詳しく見る</span>
        </div>

        <div class="grid-2">
          <div class="feature-card">
            <img src="/images/icon-analysis.png" alt="弱点分析" />
            <p>弱点分析</p>
          </div>
          <div class="feature-card">
            <img src="/images/icon-study.png" alt="学習メニュー" />
            <p>学習メニュー</p>
          </div>
        </div>

        <div class="section-head">
          <span>最近の記録</span>
          <a href="#">すべて見る</a>
        </div>

        <div class="card">
          <div class="record-row">
            <span>2026/06/08</span>
            <span>負け</span>
          </div>
          <div class="record-main">右玉 vs 雁木</div>
          <div class="record-venue">将棋連盟</div>
          <span class="tag">寄せの崩し</span>
        </div>

        <div class="bottom-nav">
          <span class="active">ホーム</span>
          <span>記録</span>
          <span class="active">記録する</span>
          <span>分析</span>
          <span>学習</span>
        </div>
      </div>

      <div class="phone-footer">
        明るいクリーム色の背景に、落ち着いたゴールドを差し色にしたパターンです。
      </div>
    </div>
  </body>
</html>
