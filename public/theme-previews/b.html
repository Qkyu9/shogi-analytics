<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B. ウォームナチュラル — UIプレビュー</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      :root {
        --color-bg: #f6f1ea;
        --color-bg-sub: #ebe4d9;
        --color-surface: #fffdf8;
        --color-text: #2e2a26;
        --color-text-sub: #6f6860;
        --color-primary: #9a6842;
        --color-tag-bg: #efe8dc;
        --color-tag-text: #8b5e3c;
        --color-border: #ddd4c8;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <h1>パターン B</h1>
      <p>ウォームナチュラル — 自然・やさしさ</p>
    </div>

    <nav class="nav-links">
      <a href="index.html">一覧</a>
      <a href="a.html">A</a>
      <a href="b.html" class="active">B</a>
      <a href="c.html">C</a>
    </nav>

    <div class="phone">
      <div class="phone-meta">
        <h2>B. ウォームナチュラル</h2>
        <p>リネン・ベージュ × コッパーブラウン</p>
      </div>

      <div class="screen">
        <div class="app-bar">
          <span>将棋 Analytics</span>
          <span>設定</span>
        </div>

        <button class="btn-primary" type="button">対局を記録する</button>

        <div class="card">
          <div class="card-label">いまの弱点</div>
          <div class="card-title">寄せの崩し</div>
          <div class="card-sub">3回（42%）</div>
          <span class="card-link">詳しく見る</span>
        </div>

        <div class="grid-2">
          <div class="feature-card">
            <img src="../images/icon-analysis.png" alt="弱点分析" />
            <p>弱点分析</p>
          </div>
          <div class="feature-card">
            <img src="../images/icon-study.png" alt="学習メニュー" />
            <p>学習メニュー</p>
          </div>
        </div>

        <div class="section-head">
          <span>最近の記録</span>
          <a href="#">すべて見る</a>
        </div>

        <div class="card">
          <div class="record-row">
            <span>2026/06/08</span>
            <span>負け</span>
          </div>
          <div class="record-main">右玉 vs 雁木</div>
          <div class="record-venue">将棋連盟</div>
          <span class="tag">寄せの崩し</span>
        </div>

        <div class="bottom-nav">
          <span class="active">ホーム</span>
          <span>記録</span>
          <span class="active">記録する</span>
          <span>分析</span>
          <span>学習</span>
        </div>
      </div>

      <div class="phone-footer">
        リネンや木の温もりを感じるベージュ系。アクセントはコッパーブラウンです。
      </div>
    </div>
  </body>
</html>
